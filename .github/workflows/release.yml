name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-pipeline
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  discover-release-targets:
    name: Discover release targets
    runs-on: ubuntu-24.04
    outputs:
      has_releases: ${{ steps.discover.outputs.has_releases }}
      release_matrix: ${{ steps.discover.outputs.release_matrix }}
      build_matrix: ${{ steps.discover.outputs.build_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover tags that should be released
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          git fetch --force --tags origin +refs/heads/main:refs/remotes/origin/main

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          def git_lines(*args: str) -> list[str]:
              output = git(*args)
              return [line for line in output.splitlines() if line]

          def is_on_main(commit: str) -> bool:
              return (
                  subprocess.run(
                      [
                          "git",
                          "merge-base",
                          "--is-ancestor",
                          commit,
                          "refs/remotes/origin/main",
                      ],
                      check=False,
                  ).returncode
                  == 0
              )

          def slugify(tag: str) -> str:
              slug = re.sub(r"[^A-Za-z0-9._-]+", "-", tag).strip("-")
              return slug or "tag"

          def has_complete_release(tag: str) -> bool:
              slug = slugify(tag)
              expected_assets = {
                  f"pauseink-{slug}-linux-x86_64.tar.gz",
                  f"pauseink-{slug}-macos-x86_64.tar.gz",
                  f"pauseink-{slug}-windows-x86_64.zip",
              }
              result = subprocess.run(
                  ["gh", "release", "view", tag, "--json", "assets"],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
                  text=True,
                  check=False,
              )
              if result.returncode != 0:
                  return False

              payload = json.loads(result.stdout or "{}")
              actual_assets = {
                  asset.get("name", "")
                  for asset in payload.get("assets", [])
                  if asset.get("name")
              }
              return expected_assets.issubset(actual_assets)

          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          github_ref = os.environ.get("GITHUB_REF", "")
          github_sha = os.environ.get("GITHUB_SHA", "")
          event_before = os.environ.get("EVENT_BEFORE", "")

          release_targets: list[dict[str, str]] = []
          seen_tags: set[str] = set()

          def add_release_target(tag: str) -> None:
              if not tag or tag in seen_tags or has_complete_release(tag):
                  return
              seen_tags.add(tag)
              release_targets.append({"tag": tag, "tag_slug": slugify(tag)})

          if ref_type == "tag":
              tag_commit = git("rev-list", "-n", "1", ref_name)
              if is_on_main(tag_commit):
                  add_release_target(ref_name)
          elif github_ref == "refs/heads/main":
              if event_before and event_before != "0" * 40:
                  candidate_commits = git_lines("rev-list", f"{event_before}..{github_sha}")
              else:
                  candidate_commits = [github_sha]

              for commit in candidate_commits:
                  if not is_on_main(commit):
                      continue
                  for tag in git_lines("tag", "--points-at", commit):
                      add_release_target(tag)

          build_matrix = {"include": []}
          for target in release_targets:
              for os_name, platform, binary_path, archive_format in [
                  ("ubuntu-24.04", "linux-x86_64", "target/release/pauseink-app", "tar.gz"),
                  ("macos-13", "macos-x86_64", "target/release/pauseink-app", "tar.gz"),
                  ("windows-latest", "windows-x86_64", "target/release/pauseink-app.exe", "zip"),
              ]:
                  build_matrix["include"].append(
                      {
                          "tag": target["tag"],
                          "tag_slug": target["tag_slug"],
                          "os": os_name,
                          "platform": platform,
                          "binary_path": binary_path,
                          "archive_format": archive_format,
                      }
                  )

          release_matrix = {"include": release_targets}
          has_releases = "true" if release_targets else "false"

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as output:
              print(f"has_releases={has_releases}", file=output)
              print(f"release_matrix={json.dumps(release_matrix)}", file=output)
              print(f"build_matrix={json.dumps(build_matrix)}", file=output)

          print(
              json.dumps(
                  {
                      "has_releases": has_releases,
                      "release_matrix": release_matrix,
                      "build_matrix": build_matrix,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
          )
          PY

  validate-tag:
    name: Validate ${{ matrix.tag }}
    needs: discover-release-targets
    if: needs.discover-release-targets.outputs.has_releases == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-release-targets.outputs.release_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.tag }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Compile app targets
        run: cargo check -p pauseink-app --all-targets

      - name: Run workspace tests
        run: cargo test --workspace

  build:
    name: Build ${{ matrix.tag }} / ${{ matrix.platform }}
    needs:
      - discover-release-targets
      - validate-tag
    if: needs.discover-release-targets.outputs.has_releases == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-release-targets.outputs.build_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.tag }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p pauseink-app

      - name: Package release artifact
        run: python scripts/package_release_asset.py --binary "${{ matrix.binary_path }}" --platform "${{ matrix.platform }}" --version "${{ matrix.tag }}" --format "${{ matrix.archive_format }}" --output-dir dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.tag_slug }}-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish ${{ matrix.tag }}
    needs:
      - discover-release-targets
      - build
    if: needs.discover-release-targets.outputs.has_releases == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-release-targets.outputs.release_matrix) }}

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ matrix.tag_slug }}-*
          merge-multiple: true
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
